# see also:
# https://github.com/actions/upload-pages-artifact
# https://github.com/actions/deploy-pages
# https://github.com/actions/starter-workflows/blob/main/pages/mdbook.yml

name: Build & Maybe Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-maybe-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install wasm-pack
        run: cargo install wasm-pack --version 0.15.0

      - name: Install mdBook
        run: |
          cargo install mdbook
          cargo install mdbook-katex@0.10.0-alpha # https://github.com/lzanini/mdbook-katex/issues/130

      - name: Fetch Triton VM repository
        uses: actions/checkout@v6
        with:
          repository: TritonVM/triton-vm
          path: triton-vm

      - name: Install widget dependencies
        working-directory: triton-play/widget
        run: npm ci

      - name: Build triton-play widget
        working-directory: triton-play/widget
        run: npm run build

      - name: Build tutorial
        run: mdbook build ./tutorial

      - name: Build Triton VM specification
        run: mdbook build triton-vm/specification

      - name: Assemble site
        run: |
          mkdir -p ./site
          cp index.html site.webmanifest ./site/
          cp -r img ./site/img
          cp -r ./triton-vm/specification/book ./site/spec
          cp -r ./tutorial/book ./site/tutorial
          mkdir -p ./site/triton-play/widget
          cp -r ./triton-play/widget/dist ./site/triton-play/widget/dist

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

      - name: Deploy to GitHub Pages
        if: >
          (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
          && github.ref == 'refs/heads/main'
        uses: actions/deploy-pages@v4
